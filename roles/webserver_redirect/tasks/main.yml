# nginx webserver

# config based on https://github.com/mikechernev/dockerised-php/tree/feature/log-to-stdout
- name: validate custom redirect domain blocks are not empty
  assert:
    that:
      - (redirect_domain_block.domains | default([]) | length) > 0
    fail_msg: 'Each webserver_redirect_custom_domains entry must define at least one domain'
  loop: '{{ webserver_redirect_custom_domains }}'
  loop_control:
    loop_var: redirect_domain_block

- name: validate custom redirect domains are unique and do not overlap with legacy domains
  vars:
    custom_redirect_domains: >-
      {{
        webserver_redirect_custom_domains
        | map(attribute='domains')
        | flatten
        | map('lower')
        | list
      }}
    legacy_redirect_domains: >-
      {{
        ([webserver_redirect_domain] + webserver_redirect_addon_domains)
        | map('lower')
        | list
      }}
  assert:
    that:
      - (custom_redirect_domains | unique | length) == (custom_redirect_domains | length)
      - (custom_redirect_domains | intersect(legacy_redirect_domains) | length) == 0
    fail_msg: >-
      Custom redirect domains must be unique and must not overlap with
      webserver_redirect_domain or webserver_redirect_addon_domains.

- name: webserver_redirect_directories
  file:
    path: '{{ item }}'
    state: directory
    owner: root
    group: root
    mode: '0755'
  with_items:
    - '{{ webserver_redirect_path }}'

- name: deploy docker-compose.yml
  template:
    src: docker-compose.yml.j2
    dest: '{{ webserver_redirect_path }}/docker-compose.yml'
    owner: root
    group: root
    mode: '0640'
  notify: webserver_redirect_restart

- name: deploy config
  template:
    src: '{{ item }}'
    dest: '{{ webserver_redirect_path }}/{{ item }}'
    owner: www-data
    group: www-data
    mode: '0640'
  with_items:
    - site.conf
  notify: webserver_redirect_restart

- name: webserver_redirect_docker-compose-up
  community.docker.docker_compose_v2:
    project_src: '{{ webserver_redirect_path }}'
    state: present
    remove_orphans: true
    pull: "{{ webserver_redirect_docker_pull | ternary('always', 'policy') }}"
  register: webserver_redirect__register_compose
  tags: compose_up

- name: print actions by compose # noqa no-handler
  vars:
    actions: "{{ webserver_redirect__register_compose.actions }}"
  debug:
    var: actions
  changed_when: true
  when: webserver_redirect__register_compose is defined and webserver_redirect__register_compose.changed
